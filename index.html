<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" >
  <meta name="viewport" content="width=device-width, initial-scale=1.0" >
  <title>Catalogo California Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" >
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" >
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Catalogo de Juegos De California Games</h1>
      <p class="subtitle">Lista de juegos de PS4. Incluye buscador y filtros.</p>
    </section>

    <section class="controls">
      <input id="search" class="input" type="text" placeholder="Buscar por nombre o CUSA...">
      <select id="sort" class="select">
        <option value="az">Orden: A-Z</option>
        <option value="za">Orden: Z-A</option>
        <option value="size-desc">Tamano: mayor a menor</option>
        <option value="size-asc">Tamano: menor a mayor</option>
      </select>
      <select id="size" class="select">
        <option value="all">Tamano: todos</option>
        <option value="lt51">Menos de 51 GB</option>
        <option value="gt51">Mas de 51 GB</option>
      </select>
    </section>

    <section class="stats" id="stats"></section>
    <p id="status" class="status">Cargando datos...</p>
    <section id="grid" class="grid"></section>
    <nav id="pagination" class="pagination" aria-label="Paginacion de juegos"></nav>
  </main>

  <script>
    const state = {
      all: [],
      filtered: [],
      currentPage: 1,
      pageSize: 100
    };

    function parseSizeToMB(line) {
      const m = line.match(/(\d+(?:\.\d+)?)\s*(GB|MB)/i);
      if (!m) return null;
      const value = Number(m[1]);
      const unit = m[2].toUpperCase();
      return unit === "GB" ? value * 1024 : value;
    }

    function cleanTitle(line) {
      let t = line;
      t = t.replace(/CUSA\d{5}/gi, "");
      t = t.replace(/\b(?:up|v)\s?\d+(?:\.\d+)?\b/gi, "");
      t = t.replace(/PS4\s*PKG.*/i, "");
      t = t.replace(/\s{2,}/g, " ").trim();
      return t;
    }

    function parseGame(line, index) {
      const id = (line.match(/CUSA\d{5}/i) || [""])[0].toUpperCase();
      const version = (line.match(/\b(?:up|v)\s?\d+(?:\.\d+)?\b/i) || [""])[0];
      const sizeMB = parseSizeToMB(line);
      const sizeLabel = (line.match(/\d+(?:\.\d+)?\s*(?:GB|MB)/i) || ["N/D"])[0].replace(/\s+/g, " ").toUpperCase();

      return {
        index,
        raw: line,
        title: cleanTitle(line),
        id,
        version,
        sizeMB,
        sizeLabel
      };
    }

    function formatGBFromMB(mb) {
      if (typeof mb !== "number") return "N/D";
      return (mb / 1024).toFixed(2) + " GB";
    }

    function renderStats(items) {
      const totalMB = items.reduce((acc, g) => acc + (g.sizeMB || 0), 0);
      const stats = document.getElementById("stats");
      stats.innerHTML = `
        <span class="pill">Resultados: <strong>${items.length}</strong></span>
        <span class="pill">Tamano total aprox: <strong>${formatGBFromMB(totalMB)}</strong></span>
      `;
    }

    function renderGrid(items) {
      const grid = document.getElementById("grid");
      if (!items.length) {
        grid.innerHTML = "";
        return;
      }

      grid.innerHTML = items.map((g) => {
        // Genera la ruta de la imagen local si existe el ID CUSA
        const imgSrc = g.id ? `portadas/${g.id}.jpg` : "";

        return `
        <article class="card">
          <div class="cover-wrap">
            <img class="cover-image" 
                 src="${imgSrc}" 
                 alt="Portada de ${escapeHtml(g.title || 'Juego')}" 
                 loading="lazy" 
                 decoding="async"
                 onload="this.classList.add('loaded'); this.classList.remove('missing');"
                 onerror="this.classList.add('missing'); this.classList.remove('loaded'); this.removeAttribute('src');">
            <div class="cover-fallback">SIN PORTADA</div>
          </div>
          <h3 class="title">${escapeHtml(g.title || 'Sin titulo')}</h3>
          <div class="meta">
            ${g.id ? `<span class="tag">${escapeHtml(g.id)}</span>` : ""}
            <span class="tag">${escapeHtml(g.sizeLabel)}</span>
            ${g.version ? `<span class="tag">${escapeHtml(g.version.toUpperCase())}</span>` : ""}
          </div>
        </article>
      `}).join("");
    }

    function paginateItems(items) {
      const totalPages = Math.max(1, Math.ceil(items.length / state.pageSize));

      if (state.currentPage > totalPages) state.currentPage = totalPages;
      if (state.currentPage < 1) state.currentPage = 1;

      if (!items.length) {
        return { pageItems: [], totalPages: 1, start: 0, end: 0 };
      }

      const start = (state.currentPage - 1) * state.pageSize;
      const end = Math.min(start + state.pageSize, items.length);

      return {
        pageItems: items.slice(start, end),
        totalPages,
        start,
        end
      };
    }

    function getPaginationRange(totalPages) {
      const maxVisible = 7;
      let start = Math.max(1, state.currentPage - Math.floor(maxVisible / 2));
      let end = start + maxVisible - 1;

      if (end > totalPages) {
        end = totalPages;
        start = Math.max(1, end - maxVisible + 1);
      }

      return { start, end };
    }

    function renderPagination(totalItems, totalPages, start, end) {
      const pagination = document.getElementById("pagination");
      if (!totalItems) {
        pagination.innerHTML = "";
        return;
      }

      const range = getPaginationRange(totalPages);
      const canPrev = state.currentPage > 1;
      const canNext = state.currentPage < totalPages;

      let html = `<button class="page-btn" data-page="prev" ${canPrev ? "" : "disabled"}>Anterior</button>`;

      if (range.start > 1) {
        html += `<button class="page-btn" data-page="1">1</button>`;
        if (range.start > 2) html += `<span class="page-dots">...</span>`;
      }

      for (let i = range.start; i <= range.end; i += 1) {
        html += `<button class="page-btn ${i === state.currentPage ? "active" : ""}" data-page="${i}">${i}</button>`;
      }

      if (range.end < totalPages) {
        if (range.end < totalPages - 1) html += `<span class="page-dots">...</span>`;
        html += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;
      }

      html += `<button class="page-btn" data-page="next" ${canNext ? "" : "disabled"}>Siguiente</button>`;
      html += `<span class="page-summary">Mostrando ${start + 1}-${end} de ${totalItems}</span>`;

      pagination.innerHTML = html;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function applyFilters(options = {}) {
      const resetPage = options.resetPage === true;
      const q = document.getElementById("search").value.trim().toLowerCase();
      const sort = document.getElementById("sort").value;
      const size = document.getElementById("size").value;

      if (resetPage) state.currentPage = 1;

      let items = state.all.filter((g) => {
        if (q) {
          const hit = g.title.toLowerCase().includes(q) || g.id.toLowerCase().includes(q) || g.raw.toLowerCase().includes(q);
          if (!hit) return false;
        }

        if (size !== "all") {
          if (typeof g.sizeMB !== "number") return false;
          const limitMB = 51 * 1024;
          if (size === "lt51" && g.sizeMB >= limitMB) return false;
          if (size === "gt51" && g.sizeMB <= limitMB) return false;
        }

        return true;
      });

      items.sort((a, b) => {
        if (sort === "az") return a.title.localeCompare(b.title);
        if (sort === "za") return b.title.localeCompare(a.title);
        if (sort === "size-desc") return (b.sizeMB || -1) - (a.sizeMB || -1);
        if (sort === "size-asc") return (a.sizeMB || Number.MAX_SAFE_INTEGER) - (b.sizeMB || Number.MAX_SAFE_INTEGER);
        return 0;
      });

      state.filtered = items;
      renderStats(items);

      const { pageItems, totalPages, start, end } = paginateItems(items);
      renderGrid(pageItems);
      renderPagination(items.length, totalPages, start, end);

      const status = document.getElementById("status");
      status.classList.remove("error");
      status.textContent = items.length
        ? `Pagina ${state.currentPage} de ${totalPages}`
        : "No hay resultados con esos filtros.";
    }

    async function loadCatalog() {
      const status = document.getElementById("status");
      try {
        const resp = await fetch("./juegos.txt", { cache: "no-store" });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();

        const lines = text
          .split(/\r?\n/)
          .map((l) => l.trim())
          .filter(Boolean)
          .filter((l) => !/^!+$/.test(l))
          .filter((l) => !/^California Game/i.test(l));

        state.all = lines.map((line, i) => parseGame(line, i));

        status.textContent = "";
        applyFilters({ resetPage: true });
      } catch (err) {
        status.classList.add("error");
        status.textContent = "No se pudo leer juegos.txt. Abre la pagina con un servidor local (por ejemplo Live Server).";
      }
    }

    ["search", "sort", "size"].forEach((id) => {
      document.getElementById(id).addEventListener("input", () => applyFilters({ resetPage: true }));
      document.getElementById(id).addEventListener("change", () => applyFilters({ resetPage: true }));
    });

    document.getElementById("pagination").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-page]");
      if (!button || button.disabled) return;

      const action = button.dataset.page;
      if (action === "prev") state.currentPage -= 1;
      else if (action === "next") state.currentPage += 1;
      else state.currentPage = Number(action);

      applyFilters();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    loadCatalog();
  </script>
</body>
</html>
